version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: db_dev_api_reports
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d db_dev_api_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:15
    container_name: postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: db_test_api_reports
    ports:
      - '5433:5432'  # porta diferente para não conflitar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d db_test_api_reports"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:  